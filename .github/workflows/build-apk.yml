name: Ghost – Build APK

on:
  push:
    branches: [main, develop]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      # ── 1. Checkout ────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java 17 ─────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Node 20 ─────────────────────────────────────────────
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 4. Install JS deps ─────────────────────────────────────
      - name: Install JS dependencies
        run: yarn install --non-interactive --prefer-offline

      # ── 5. Android SDK ─────────────────────────────────────────
      # ubuntu-latest already has Android SDK at $ANDROID_SDK_ROOT.
      # We just need to accept licenses and install the exact components.
      - name: Accept SDK licenses & install components
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;26.1.10909125"

      # ── 6. Gradle wrapper jar ──────────────────────────────────
      - name: Download Gradle wrapper jar
        run: |
          mkdir -p android/gradle/wrapper
          curl -sSfL \
            "https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar" \
            -o android/gradle/wrapper/gradle-wrapper.jar

      # ── 7. Gradle cache ────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── 8. JS bundle ───────────────────────────────────────────
      - name: Create assets directory
        run: mkdir -p android/app/src/main/assets

      - name: Bundle React Native JS
        run: |
          yarn react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            --reset-cache

      # ── 9. Debug keystore ──────────────────────────────────────
      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore android/app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Ghost Debug, O=Ghost, C=SG" 2>/dev/null || true

      # ── 10. Release keystore (tag builds only) ─────────────────
      - name: Decode release keystore
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode \
            > android/app/ghost-release.keystore
          printf "storeFile=ghost-release.keystore\nstorePassword=${{ secrets.STORE_PASSWORD }}\nkeyAlias=${{ secrets.KEY_ALIAS }}\nkeyPassword=${{ secrets.KEY_PASSWORD }}\n" \
            > android/keystore.properties

      # ── 11. Build ──────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        if: "!startsWith(github.ref, 'refs/tags/v')"
        working-directory: android
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1

      - name: Build Release APK
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: android
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace 2>&1

      # ── 12. Upload artifacts ───────────────────────────────────
      - name: Upload Debug APK
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: ghost-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: ghost-release-${{ github.ref_name }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      # ── 13. GitHub Release (on tag) ────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
          body: |
            ## Ghost ${{ github.ref_name }}
            Anonymous P2P messenger — no account, no server, no phone number.
            **Install:** Download APK → Settings → Unknown sources → tap to install.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
